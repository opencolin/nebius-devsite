# Local dev stack — mirrors nebius.com's topology in miniature:
#   Postgres ── Directus ──▶ Next.js ◀── Typesense
#                  │
#                  └──▶ Mailcatcher (password resets, email verifications)
#
# Production runs the same Directus + Postgres + Typesense pieces on Azure
# Container Apps + Azure Database for Postgres + Typesense Cloud.

name: nebius-homepage

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-directus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      POSTGRES_DB: ${POSTGRES_DB:-directus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-directus}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  directus:
    image: directus/directus:11.17.4
    restart: unless-stopped
    ports:
      - "8055:8055"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      KEY: ${DIRECTUS_KEY:-please-replace-me-with-uuid}
      SECRET: ${DIRECTUS_SECRET:-please-replace-me-with-long-random-string}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-directus}
      DB_USER: ${POSTGRES_USER:-directus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      REDIS: redis://redis:6379
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-changeme}
      PUBLIC_URL: http://localhost:8055
      # CORS so the Next dev server (3000) can talk to Directus directly when needed
      CORS_ENABLED: "true"
      CORS_ORIGIN: http://localhost:3000
      CORS_CREDENTIALS: "true"
      # Email via mailcatcher
      EMAIL_FROM: no-reply@nebius-homepage.local
      EMAIL_TRANSPORT: smtp
      EMAIL_SMTP_HOST: mailcatcher
      EMAIL_SMTP_PORT: 1025
      EMAIL_SMTP_SECURE: "false"
      EMAIL_SMTP_IGNORE_TLS: "true"
    volumes:
      - directus-uploads:/directus/uploads
      - ../apps/directus/extensions:/directus/extensions
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8055/server/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  typesense:
    image: typesense/typesense:29.0
    restart: unless-stopped
    ports:
      - "8108:8108"
    command:
      - --data-dir=/data
      - --api-key=${TYPESENSE_ADMIN_KEY:-xyz-typesense-admin-key}
      - --enable-cors
    volumes:
      - typesense-data:/data

  mailcatcher:
    image: dockage/mailcatcher:0.9.0
    restart: unless-stopped
    ports:
      - "1080:1080"  # web UI
      - "1025:1025"  # SMTP

volumes:
  postgres-data:
  directus-uploads:
  typesense-data:
